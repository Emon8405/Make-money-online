<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Now</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
text-align:center;
}

.box{
background:#fff;
color:#111;
padding:30px;
border-radius:15px;

max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
color:#2563eb;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#1d4ed8;
}

#count{
font-size:28px;

<body>

<div class="box">

<h1>Download Ready</h1>

<p>Wait <span id="count">5</span> seconds...</p>
  <div style="width:100%;height:10px;background:#ddd;border-radius:10px;margin:20px 0;">
  <div id="progress" style="width:0%;height:10px;background:#2563eb;border-radius:10px;transition:width 1s;"></div>
  </div>

<button id="btn" style="display:none;">Continue Download</button>
  <hr>

<h3>Why Download?</h3>

<ul style="text-align:left;line-height:2;">
<li>✅ 100% Free Access</li>
<li>✅ Instant Download</li>
<li>✅ Safe & Secure</li>
<li>✅ Fast Download Speed</li>
<li>✅ Mobile Friendly</li>
</ul>

</div>

<script>

let n=5;

let c=document.getElementById("count");

let btn=document.getElementById("btn");

let timer=setInterval(function(){

n--;

c.innerHTML=n;

if(n==0){

clearInterval(timer);

c.innerHTML="Done";
  document.getElementById("progress").style.width=((5-n)*20)+"%";

btn.style.display="inline-block";

}

},1000);

btn.onclick=function(){

window.location.href="https://www.effectivecpmnetwork.com/qv8pv4rpug?key=017081997a095bada346672a16db02c2";

}

</script>
