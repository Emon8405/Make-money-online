<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Now</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
text-align:center;
}

.box{
background:#fff;
color:#111;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
color:#2563eb;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#1d4ed8;
}

#count{
font-size:28px;
font-weight:bold;
color:red;
}
</style>

</head>

<body>

<div class="box">

<h1>Download Ready</h1>

<p>Your file is almost ready.</p>

<p>Wait <span id="count">5</span> seconds...</p>

<button id="btn" style="display:none;">Continue Download</button>

</div>

<script>

let n=5;

let c=document.getElementById("count");

let btn=document.getElementById("btn");

let timer=setInterval(function(){

n--;

c.innerHTML=n;

if(n==0){

clearInterval(timer);

c.innerHTML="Done";

btn.style.display="inline-block";

}

},1000);

btn.onclick=function(){

window.location.href="https://www.effectivecpmnetwork.com/qv8pv4rpug?key=017081997a095bada346672a16db02c2";

}

</script>

</body>
</html>
